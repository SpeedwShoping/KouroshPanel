name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
          - armv7
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install cross tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Build binary
        run: |
          export CGO_ENABLED=1 GOOS=linux
          case "${{ matrix.platform }}" in
            amd64) export GOARCH=amd64 CC=gcc ;;
            arm64) export GOARCH=arm64 CC=aarch64-linux-gnu-gcc ;;
            armv7) export GOARCH=arm GOARM=7 CC=arm-linux-gnueabihf-gcc ;;
          esac
          go build -ldflags="-w -s" -o kourosh-bin main.go
          mkdir -p kourosh/bin
          mv kourosh-bin kourosh/kourosh
          cp k-ui.sh kourosh.service.* kourosh/

      - name: Download deps
        run: |
          cd kourosh/bin
          V=v26.7.11
          case "${{ matrix.platform }}" in
            amd64) F=Xray-linux-64.zip;      MTGARCH=amd64 ;;
            arm64) F=Xray-linux-arm64-v8a.zip; MTGARCH=arm64 ;;
            armv7) F=Xray-linux-arm32-v7a.zip; MTGARCH=armv7 ;;
          esac
          wget -q https://github.com/XTLS/Xray-core/releases/download/$V/$F
          unzip -q $F && rm $F
          mv xray xray-linux-${{ matrix.platform }}
          MTG_VER=$(curl -sf -o /dev/null -w '%{redirect_url}' "https://github.com/mhsanaei/mtg-multi/releases/latest" | sed 's#.*/releases/tag/##')
          if [ -n "$MTG_VER" ]; then
            MTG_PKG="mtg-multi-${MTG_VER#v}-linux-${MTGARCH}"
            wget -q "https://github.com/mhsanaei/mtg-multi/releases/download/${MTG_VER}/${MTG_PKG}.tar.gz" \
              && tar -xzf "${MTG_PKG}.tar.gz" \
              && mv "${MTG_PKG}/mtg-multi" "mtg-linux-${{ matrix.platform }}" \
              && rm -rf "${MTG_PKG}" "${MTG_PKG}.tar.gz" || echo "mtg-multi download failed — MTProto disabled in this build"
          fi
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          wget -q https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          wget -q -O geoip_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat
          wget -q -O geosite_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat

      - name: Package
        run: tar czf k-ui-linux-${{ matrix.platform }}.tar.gz kourosh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: k-ui-linux-${{ matrix.platform }}.tar.gz

  build-windows:
    name: Build (Windows)
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-sqlite3

      - name: Build binary
        shell: msys2 {0}
        run: |
          export PATH="/c/hostedtoolcache/windows/go/$(ls /c/hostedtoolcache/windows/go | sort -V | tail -1)/x64/bin:$PATH"
          export CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc
          go build -ldflags="-w -s" -o kourosh.exe main.go

      - name: Package
        run: |
          mkdir kourosh\bin
          move kourosh.exe kourosh\
          cd kourosh\bin
          curl -sLO https://github.com/XTLS/Xray-core/releases/download/v26.7.11/Xray-windows-64.zip
          tar -xf Xray-windows-64.zip
          del Xray-windows-64.zip
          ren xray.exe xray-windows-amd64.exe
          curl -sLO https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          curl -sLO https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          cd ..\..
          tar -acf kourosh-windows-amd64.zip kourosh

      - uses: softprops/action-gh-release@v2
        with:
          files: kourosh-windows-amd64.zip
